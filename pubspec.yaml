name: sample_banking
description: "Kind Banking - Banking for Everyone"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Architecture
  clean_framework:
    path: "./package/clean_framework-0.4.2"

  # Routing & Navigation
  go_router: ^14.8.1
  app_links: ^6.3.3

  # State Management & DI
  provider: ^6.1.2

  # Networking
  http: ^1.2.2
  # Note: Dio can be added later for advanced features like interceptors

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.7
  json_annotation: ^4.9.0

  # Voice & Intents
  flutter_app_intents: ^0.7.0

  flutter_local_ai: ^0.0.6
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  genui_a2ui: ^0.7.0
  genui: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
