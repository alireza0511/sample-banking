    crashlytics_app_id_android: "1:000000000000:android:int000000000000000"
    crashlytics_app_id_ios: "1:000000000000:ios:int000000000000000"
    firebase_app_id_ios: "1:000000000000:ios:int000000000000000"

  prod:
    bundle_id_suffix: ""
    app_name: "Banking"
    backend_url: "https://api.bank.internal"
    crashlytics_app_id_android: "1:000000000000:android:prod00000000000000"
    crashlytics_app_id_ios: "1:000000000000:ios:prod00000000000000"
    firebase_app_id_ios: "1:000000000000:ios:prod00000000000000"
